<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI智能客服系统</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <h1>AI客服Agent</h1>
      <p>RAG知识库 · 多Agent协同 · 工单转人工</p>
      <div class="tag">Intent Agent</div>
      <div class="tag">Retrieval Agent</div>
      <div class="tag">Answer Agent</div>
      <div class="tag">Quality Agent</div>
    </aside>

    <main class="chat">
      <div id="messages" class="messages">
        <div class="msg bot">
          你好，我是AI智能客服。你可以问我订单、退款、发货、优惠券、售后等问题。
        </div>
      </div>

      <div class="input-area">
        <input id="input" placeholder="请输入你的问题，例如：我的订单OD10086什么时候发货？" />
        <button onclick="sendMessage()">发送</button>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
